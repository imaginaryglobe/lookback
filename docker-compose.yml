# Optional: only needed if QDRANT_MODE=server in your .env.
# By default the app runs Qdrant embedded (no Docker needed) -- see .env.example.
# This compose file is for the advanced case of a standalone Qdrant server.
# Data persists in ./qdrant_storage (bind mount) so it survives container restarts/recreation.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: media-search-qdrant
    ports:
      - "6333:6333"   # REST API used by qdrant-client
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
